name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build-msi:
    name: Build MSI on Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msi-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-msi-

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install GUI dependencies
        working-directory: gui
        run: pnpm install --frozen-lockfile

      - name: Run unit tests (Rust)
        run: cargo test -p gui --lib

      - name: Run unit tests (TS)
        working-directory: gui
        run: pnpm test

      - name: Build MSI
        working-directory: gui
        run: pnpm tauri build

      - name: Collect SHA-256 of the MSI
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path target/release/bundle/msi -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { throw "MSI not found in target/release/bundle/msi" }
          $hash = (Get-FileHash -Path $msi.FullName -Algorithm SHA256).Hash.ToLower()
          $hash | Out-File -FilePath "$($msi.FullName).sha256" -Encoding ascii -NoNewline
          Write-Host "MSI: $($msi.FullName)"
          Write-Host "SHA-256: $hash"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/msi/*.sha256

  publish:
    name: Publish GitHub Release
    needs: build-msi
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download MSI artifact
        uses: actions/download-artifact@v4
        with:
          name: msi
          path: dist

      - name: Extract release notes from CHANGELOG.md
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$version" '
              /^## \[/ {
                if (capture) exit
                if ($0 ~ "\\[" ver "\\]") capture=1; next
              }
              capture { print }
            ' CHANGELOG.md > release_notes.md
          fi
          if [ ! -s release_notes.md ]; then
            echo "_(No CHANGELOG entry found for ${tag}.)_" > release_notes.md
          fi
          {
            echo ""
            echo "### Install"
            echo ""
            echo "1. Download \`LecooControlCenter_${version}_x64_en-US.msi\` below."
            echo "2. Run it as Administrator. The installer registers \`LecooControlDaemon\` as a Windows service and starts it."
            echo "3. Open **LecooControlCenter** from the Start menu."
            echo ""
            echo "### Verify integrity"
            echo ""
            echo "The accompanying \`.sha256\` file holds the SHA-256 of the MSI:"
            echo ""
            echo "\`\`\`powershell"
            echo "Get-FileHash -Algorithm SHA256 .\"LecooControlCenter_${version}_x64_en-US.msi\""
            echo "\`\`\`"
          } >> release_notes.md
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lecoo Control Center ${{ github.ref_name }}"
          files: |
            dist/*.msi
            dist/*.sha256
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-') }}
